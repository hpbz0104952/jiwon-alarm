name: 지원사업 알림 자동 체크

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install requests

      - name: 알림 스크립트 실행
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python check_jiwon.py

      - name: 본 공고 목록 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git add seen.json
            git commit -m "본 공고 목록 업데이트 [skip ci]"
            git push
          else
            echo "변경사항 없음"
          fi
